<!-- Character Selection Screen (shown before game loads) -->
<div id="character-selection-screen"
    class="fixed inset-0 z-[10000] bg-gradient-to-b from-gray-900 via-purple-950 to-gray-900 flex items-center justify-center hidden">
    <div class="w-full max-w-md p-6">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold rpg-font text-purple-300 mb-2">⚔️ FightCraft</h1>
            <p class="text-gray-400">Choose your character</p>
        </div>

        <!-- Loading State -->
        <div id="char-loading" class="text-center py-8">
            <div class="text-4xl mb-2">⏳</div>
            <p class="text-gray-400">Loading characters...</p>
        </div>

        <!-- Character List -->
        <div id="char-list" class="hidden space-y-3 mb-4 max-h-96 overflow-y-auto">
            <!-- Characters will be inserted here -->
        </div>

        <!-- Create New Character -->
        <div id="char-create-section" class="hidden">
            <button onclick="showCreateCharacterForm()" id="show-create-btn"
                class="w-full py-3 bg-purple-600 hover:bg-purple-500 rounded-lg font-bold mb-4">
                ➕ Create New Character
            </button>

            <!-- Create Form (hidden by default) -->
            <form id="char-create-form" class="hidden menu-panel rounded-xl p-4 space-y-3" onsubmit="event.preventDefault(); createNewCharacter();">
                <h3 class="font-bold text-purple-300">Create Character</h3>
                <input type="text" id="char-name-input" name="char-name" placeholder="Character name" maxlength="20"
                    class="w-full px-3 py-2 bg-gray-800 border border-purple-900 rounded-lg focus:border-purple-500 outline-none" autocomplete="off">

                <!-- Avatar Selection -->
                <div>
                    <p class="text-sm text-gray-400 mb-2">Choose avatar:</p>
                    <div class="grid grid-cols-6 gap-2">
                        <button type="button" onclick="selectAvatar('🧙')"
                            class="avatar-btn text-3xl p-2 bg-gray-800 hover:bg-purple-900 rounded-lg border-2 border-transparent"
                            data-avatar="🧙">🧙</button>
                        <button type="button" onclick="selectAvatar('⚔️')"
                            class="avatar-btn text-3xl p-2 bg-gray-800 hover:bg-purple-900 rounded-lg border-2 border-transparent"
                            data-avatar="⚔️">⚔️</button>
                        <button type="button" onclick="selectAvatar('🛡️')"
                            class="avatar-btn text-3xl p-2 bg-gray-800 hover:bg-purple-900 rounded-lg border-2 border-transparent"
                            data-avatar="🛡️">🛡️</button>
                        <button type="button" onclick="selectAvatar('🏹')"
                            class="avatar-btn text-3xl p-2 bg-gray-800 hover:bg-purple-900 rounded-lg border-2 border-transparent"
                            data-avatar="🏹">🏹</button>
                        <button type="button" onclick="selectAvatar('🧝')"
                            class="avatar-btn text-3xl p-2 bg-gray-800 hover:bg-purple-900 rounded-lg border-2 border-transparent"
                            data-avatar="🧝">🧝</button>
                        <button type="button" onclick="selectAvatar('🧛')"
                            class="avatar-btn text-3xl p-2 bg-gray-800 hover:bg-purple-900 rounded-lg border-2 border-transparent"
                            data-avatar="🧛">🧛</button>
                    </div>
                </div>

                <div class="flex gap-2">
                    <button type="submit"
                        class="flex-1 py-2 bg-green-600 hover:bg-green-500 rounded-lg font-bold">
                        ✅ Create
                    </button>
                    <button type="button" onclick="hideCreateCharacterForm()"
                        class="flex-1 py-2 bg-gray-600 hover:bg-gray-500 rounded-lg">
                        Cancel
                    </button>
                </div>
            </form>
        </div>

        <!-- Error Message -->
        <div id="char-error" class="hidden p-3 bg-red-900/30 border border-red-900 rounded-lg text-red-400 text-sm">
        </div>
    </div>
</div>

<!-- Multiplayer Panel (Injected into game-container by ui-loader.js) -->
<div id="multiplayer-panel"
    class="absolute bottom-[280px] left-5 z-[90] w-64 bg-slate-900/90 backdrop-blur-md p-3 rounded-lg border border-blue-500/30 shadow-2xl pointer-events-auto hidden">
    <div class="flex justify-between items-center mb-2 border-b border-blue-500/30 pb-1">
        <span class="text-xs font-bold text-blue-300">🎮 Multiplayer</span>
        <span class="text-[10px] text-blue-500" id="mp-sync-status">Connected</span>
    </div>

    <div class="space-y-2">
        <button onclick="window.openMenu('statistics')"
            class="w-full py-2 bg-blue-700 hover:bg-blue-600 rounded text-xs font-bold border border-blue-900 transition-colors">
            🏆 Leaderboard
        </button>

        <div class="border-t border-gray-700/50 pt-2 mt-2">
            <div class="text-[10px] text-gray-400 mb-1">Testing Controls:</div>
            <button onclick="toggleJoystick()"
                class="w-full py-1 bg-purple-700 hover:bg-purple-600 rounded text-[10px] border border-purple-900">
                🕹️ Toggle Joystick
            </button>
        </div>
    </div>
</div>
