<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FightCraft - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        .rpg-font {
            font-family: 'Press Start 2P', cursive;
        }

        .glass {
            background: rgba(15, 15, 35, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .input-field {
            background: rgba(30, 30, 60, 0.8);
            border: 1px solid rgba(139, 92, 246, 0.4);
            transition: all 0.3s;
        }

        .input-field:focus {
            border-color: rgba(139, 92, 246, 0.8);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(139, 92, 246, 0.5);
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: rgba(139, 92, 246, 0.2);
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .floating {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>

<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4">
    <!-- Background effect -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-600/20 rounded-full blur-3xl"></div>
        <div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-blue-600/20 rounded-full blur-3xl"></div>
    </div>

    <div class="w-full max-w-md z-10">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="text-6xl mb-4 floating">⚔️</div>
            <h1 class="text-3xl font-bold rpg-font text-purple-400 mb-2">FightCraft</h1>
            <p class="text-gray-400">Geolocation RPG Adventure</p>
        </div>

        <!-- Login Form -->
        <div id="login-form" class="glass rounded-2xl p-8">
            <h2 class="text-xl font-bold text-white mb-6 text-center">Welcome Back</h2>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Email</label>
                    <input type="email" id="login-email" class="w-full px-4 py-3 rounded-lg text-white input-field"
                        placeholder="your@email.com">
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-1">Password</label>
                    <input type="password" id="login-password"
                        class="w-full px-4 py-3 rounded-lg text-white input-field" placeholder="••••••••">
                </div>

                <div id="login-error"
                    class="hidden p-3 bg-red-900/30 border border-red-700 rounded-lg text-red-400 text-sm"></div>

                <button onclick="handleLogin()" class="w-full py-3 rounded-lg font-bold text-white btn-primary">
                    🔓 Login
                </button>

                <div class="text-center">
                    <button onclick="showForgotPassword()" class="text-sm text-purple-400 hover:text-purple-300">
                        Forgot password?
                    </button>
                </div>

                <hr class="border-gray-700 my-4">

                <p class="text-center text-gray-400 text-sm">Don't have an account?</p>
                <button onclick="showRegisterForm()" class="w-full py-3 rounded-lg font-bold text-white btn-secondary">
                    📝 Create Account
                </button>
            </div>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="glass rounded-2xl p-8 hidden">
            <h2 class="text-xl font-bold text-white mb-6 text-center">Create Account</h2>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Nickname (Visible to others)</label>
                    <input type="text" id="register-name" class="w-full px-4 py-3 rounded-lg text-white input-field"
                        placeholder="Your username">
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-1">Email (Login)</label>
                    <input type="email" id="register-email" class="w-full px-4 py-3 rounded-lg text-white input-field"
                        placeholder="your@email.com">
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-1">Password</label>
                    <input type="password" id="register-password"
                        class="w-full px-4 py-3 rounded-lg text-white input-field" placeholder="Min 6 characters">
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-1">Confirm Password</label>
                    <input type="password" id="register-confirm"
                        class="w-full px-4 py-3 rounded-lg text-white input-field" placeholder="••••••••">
                </div>

                <div id="register-error"
                    class="hidden p-3 bg-red-900/30 border border-red-700 rounded-lg text-red-400 text-sm"></div>

                <button onclick="handleRegister()" class="w-full py-3 rounded-lg font-bold text-white btn-primary">
                    ✨ Create Account
                </button>

                <hr class="border-gray-700 my-4">

                <button onclick="showLoginForm()" class="w-full py-3 rounded-lg font-bold text-white btn-secondary">
                    ← Back to Login
                </button>
            </div>
        </div>

        <!-- Forgot Password Form -->
        <div id="forgot-form" class="glass rounded-2xl p-8 hidden">
            <h2 class="text-xl font-bold text-white mb-6 text-center">Reset Password</h2>

            <div class="space-y-4">
                <p class="text-gray-400 text-sm text-center">
                    Enter your email and we'll send you a link to reset your password.
                </p>

                <div>
                    <label class="block text-sm text-gray-400 mb-1">Email</label>
                    <input type="email" id="forgot-email" class="w-full px-4 py-3 rounded-lg text-white input-field"
                        placeholder="your@email.com">
                </div>

                <div id="forgot-message" class="hidden p-3 rounded-lg text-sm"></div>

                <button onclick="handleForgotPassword()"
                    class="w-full py-3 rounded-lg font-bold text-white btn-primary">
                    📧 Send Reset Link
                </button>

                <hr class="border-gray-700 my-4">

                <button onclick="showLoginForm()" class="w-full py-3 rounded-lg font-bold text-white btn-secondary">
                    ← Back to Login
                </button>
            </div>
        </div>

        <!-- Loading overlay -->
        <div id="loading-overlay" class="hidden fixed inset-0 bg-gray-900/80 flex items-center justify-center z-50">
            <div class="text-center">
                <div class="text-5xl mb-4 animate-bounce">⚔️</div>
                <p class="text-purple-400" id="loading-text">Logging in...</p>
                <p class="text-gray-500 text-xs mt-2 font-mono" id="loading-timer">0.0s</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getAuth,
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword,
            sendPasswordResetEmail,
            onAuthStateChanged,
            updateProfile,
            setPersistence,
            browserLocalPersistence
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import {
            getFirestore,
            doc,
            setDoc,
            getDoc,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_MmVmjrchLqGgl8h1Zr-7od9QHvYPlW4",
            authDomain: "fight-craft-3c3f0.firebaseapp.com",
            projectId: "fight-craft-3c3f0",
            storageBucket: "fight-craft-3c3f0.firebasestorage.app",
            messagingSenderId: "1042637371139",
            appId: "1:1042637371139:android:0c6ff703f819bc80ea9b36"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Check if already logged in
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                console.log('User already logged in:', user.email);
                // Redirect to game
                window.location.href = '/';
            }
        });

        // Form switching
        window.showLoginForm = function () {
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('forgot-form').classList.add('hidden');
        };

        window.showRegisterForm = function () {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
            document.getElementById('forgot-form').classList.add('hidden');
        };

        window.showForgotPassword = function () {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('forgot-form').classList.remove('hidden');
        };

        // Timer variable
        let loadingInterval;

        // Show loading
        function showLoading(text = 'Loading...') {
            document.getElementById('loading-text').textContent = text;
            const timerEl = document.getElementById('loading-timer');
            if (timerEl) timerEl.textContent = '0.0s';

            document.getElementById('loading-overlay').classList.remove('hidden');

            // Start Timer
            const start = Date.now();
            if (loadingInterval) clearInterval(loadingInterval);
            loadingInterval = setInterval(() => {
                const elapsed = ((Date.now() - start) / 1000).toFixed(1);
                if (timerEl) {
                    timerEl.textContent = `${elapsed}s`;
                    // Color warning logic
                    if (elapsed > 3.0) timerEl.classList.replace('text-gray-500', 'text-yellow-500');
                    if (elapsed > 8.0) timerEl.classList.replace('text-yellow-500', 'text-red-500');
                }
            }, 100);
        }

        function hideLoading() {
            document.getElementById('loading-overlay').classList.add('hidden');
            if (loadingInterval) clearInterval(loadingInterval);
        }

        // Show error
        function showError(formId, message) {
            const errorEl = document.getElementById(`${formId}-error`);
            if (errorEl) {
                errorEl.textContent = message;
                errorEl.classList.remove('hidden');
            }
        }

        function hideError(formId) {
            const errorEl = document.getElementById(`${formId}-error`);
            if (errorEl) {
                errorEl.classList.add('hidden');
            }
        }

        // Login handler
        window.handleLogin = async function () {
            hideError('login');

            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            console.log(`🔑 Login attempt: "${email}"`);

            if (!email || !password) {
                showError('login', 'Please enter email and password');
                return;
            }

            showLoading('Logging in...');

            try {
                console.log('⏳ Sending auth request to Firebase...');
                console.time('AuthRequest');

                // Explicitly set persistence
                await setPersistence(auth, browserLocalPersistence);

                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                console.timeEnd('AuthRequest');
                console.log('✅ Auth successful. UID:', userCredential.user.uid);

                const user = userCredential.user;

                console.log('✅ Sign in successful');

                // Update last login (NON-BLOCKING)
                // We do not await this, so the user gets redirected immediately
                const uid = auth.currentUser.uid;
                setDoc(doc(db, 'users', uid), {
                    lastLogin: serverTimestamp()
                }, { merge: true }).catch(err => console.warn('Background timestamp update failed:', err));

                console.log('🔄 Redirecting to index.html (simulated delay for UX)...');

                // Small delay just to let the user see "Success" state if we wanted, 
                // but for speed we go almost immediately.
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 100);

            } catch (error) {
                console.error('❌ LOGIN ERROR:', error);
                hideLoading();

                let message = 'Login failed: ' + error.message;
                if (error.code === 'auth/invalid-email') message = 'Invalid email format';
                else if (error.code === 'auth/user-not-found') message = 'No account with this email';
                else if (error.code === 'auth/wrong-password') message = 'Incorrect password';
                else if (error.code === 'auth/invalid-credential') message = 'Invalid email or password';
                else if (error.code === 'auth/too-many-requests') message = 'Too many attempts. Try again later.';
                else if (error.code === 'auth/network-request-failed') message = 'Network error. Check connection.';

                showError('login', message);
            }
        };

        // Register handler
        window.handleRegister = async function () {
            hideError('register');

            const name = document.getElementById('register-name').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;

            if (!name || !email || !password) {
                showError('register', 'Please fill all fields');
                return;
            }

            if (name.length < 3) {
                showError('register', 'Name must be at least 3 characters');
                return;
            }

            if (password.length < 6) {
                showError('register', 'Password must be at least 6 characters');
                return;
            }

            if (password !== confirm) {
                showError('register', 'Passwords do not match');
                return;
            }

            showLoading('Creating account...');

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Sync Auth Profile Name immediately
                await updateProfile(user, { displayName: name });

                // Create user document with default role
                await setDoc(doc(db, 'users', user.uid), {
                    email: email,
                    displayName: name,
                    role: 'player', // Default role
                    createdAt: serverTimestamp(),
                    lastLogin: serverTimestamp()
                });

                console.log('Registration successful:', user.email);

                // Redirect to game
                window.location.href = '/';

            } catch (error) {
                hideLoading();
                console.error('Registration error:', error);

                let message = 'Registration failed: ' + error.message;
                if (error.code === 'auth/email-already-in-use') message = 'Email already registered';
                else if (error.code === 'auth/invalid-email') message = 'Invalid email format';
                else if (error.code === 'auth/weak-password') message = 'Password is too weak';
                else if (error.code === 'auth/operation-not-allowed') message = '⚠️ Enable "Email/Password" in Firebase Console -> Authentication';
                else if (error.code === 'auth/network-request-failed') message = 'Network error. Check your connection.';

                showError('register', message);
            }
        };

        // Forgot password handler
        window.handleForgotPassword = async function () {
            const email = document.getElementById('forgot-email').value.trim();
            const messageEl = document.getElementById('forgot-message');

            if (!email) {
                messageEl.className = 'p-3 bg-red-900/30 border border-red-700 rounded-lg text-red-400 text-sm';
                messageEl.textContent = 'Please enter your email';
                messageEl.classList.remove('hidden');
                return;
            }

            showLoading('Sending reset link...');

            try {
                await sendPasswordResetEmail(auth, email);

                hideLoading();
                messageEl.className = 'p-3 bg-green-900/30 border border-green-700 rounded-lg text-green-400 text-sm';
                messageEl.textContent = '✅ Reset link sent! Check your email.';
                messageEl.classList.remove('hidden');

            } catch (error) {
                hideLoading();
                console.error('Reset error:', error);

                messageEl.className = 'p-3 bg-red-900/30 border border-red-700 rounded-lg text-red-400 text-sm';
                messageEl.textContent = error.code === 'auth/user-not-found'
                    ? 'No account with this email'
                    : 'Failed to send reset link';
                messageEl.classList.remove('hidden');
            }
        };

        // Enter key handlers
        document.getElementById('login-password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        document.getElementById('register-confirm').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleRegister();
        });

        document.getElementById('forgot-email').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleForgotPassword();
        });

        console.log('✅ Login page loaded');
    </script>
</body>

</html>
